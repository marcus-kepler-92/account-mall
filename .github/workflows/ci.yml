name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          # Use repo secret or variable; fallback for fork PRs where secrets are not available
          DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
        env:
          # Tests use prismaMock; no real DB. Placeholder only so env exists for any code that reads it.
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          BETTER_AUTH_SECRET: "test-secret-at-least-32-characters-long"
